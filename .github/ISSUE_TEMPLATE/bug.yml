name: Bug
description: Report something that's broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Describe the bug. What did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger this bug?
      placeholder: |
        1. Run `...`
        2. Navigate to `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is fixed?
      placeholder: |
        - [ ] Error no longer occurs when following reproduction steps
        - [ ] Existing tests still pass
    validations:
      required: true
  - type: textarea
    id: scope-boundary
    attributes:
      label: Not in scope
      description: What is explicitly NOT part of this fix?
      placeholder: "e.g., Does not refactor surrounding code, does not add new features"
  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      description: Simple bugs can skip the spec workflow. Complex bugs benefit from it.
      options:
        - Simple (skip spec workflow — just fix and PR)
        - Complex (use spec workflow)
    validations:
      required: true
