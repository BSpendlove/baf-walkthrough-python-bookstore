name: Enhancement
description: Improve an existing feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Enhancements go through the [spec workflow](../../context/PROCESS.md) unless trivial.
  - type: textarea
    id: description
    attributes:
      label: What
      description: What specific improvement do you want?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why
      description: What problem does this solve or what does it improve?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
    validations:
      required: true
  - type: textarea
    id: scope-boundary
    attributes:
      label: Not in scope
      description: What is explicitly NOT part of this enhancement?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (critical path)
        - P1 (important)
        - P2 (nice to have)
    validations:
      required: true
  - type: dropdown
    id: agents
    attributes:
      label: Suggested workflow agents
      options:
        - Single agent (spec-create → spec-finalize → spec-implement)
        - Two agents (add spec-review)
        - Three agents (add spec-review + spec-critique)
        - Full pipeline (all skills including spec-final-review)
    validations:
      required: true
