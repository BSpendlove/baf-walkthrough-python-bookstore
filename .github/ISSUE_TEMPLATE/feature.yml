name: Feature
description: Request a new capability
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        All features go through the [spec workflow](../../context/PROCESS.md). This issue becomes the source of truth for the spec and implementation.
  - type: textarea
    id: description
    attributes:
      label: What
      description: What specific deliverable do you want? Be concrete.
      placeholder: "e.g., Add user authentication with JWT tokens"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why
      description: What problem does this solve? What's the motivation?
      placeholder: "e.g., Users need to securely access their data across sessions"
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is done? List concrete, testable criteria.
      placeholder: |
        - [ ] Users can register with email/password
        - [ ] JWT tokens are issued on login
        - [ ] Protected routes reject unauthenticated requests
    validations:
      required: true
  - type: textarea
    id: scope-boundary
    attributes:
      label: Not in scope
      description: What is explicitly NOT part of this issue? Prevents scope creep.
      placeholder: "e.g., Does not include OAuth/social login, does not include password reset flow"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Implementation priority.
      options:
        - P0 (critical path)
        - P1 (important)
        - P2 (nice to have)
    validations:
      required: true
  - type: dropdown
    id: agents
    attributes:
      label: Suggested workflow agents
      description: Which agents should participate? This is a suggestion — contributors use their own agents.
      options:
        - Single agent (spec-create → spec-finalize → spec-implement)
        - Two agents (add spec-review)
        - Three agents (add spec-review + spec-critique)
        - Full pipeline (all skills including spec-final-review)
    validations:
      required: true
