services:
  app:
    build: .
    volumes:
      - ./app:/app/app
      - bookstore_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/bookstore.db
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "8000:8000"

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

volumes:
  bookstore_data:
  caddy_data:
  caddy_config:
